paths:
  train_csv: data/train.csv
  test_csv: data/test.csv
  submission_csv: submission.csv
  dl_submission_csv: submission_dl.csv
  results_dir: outputs/ml
  tune_dir: outputs/ml/tune

random_state: 42

cv:
  n_splits: 5
