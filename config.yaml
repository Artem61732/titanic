# =============================================================================
# ОБЩИЙ КОНФИГ (источник правды для ML и DL)
# =============================================================================
# Менять здесь:
#   paths.*        пути к данным, сабмитам и артефактам
#   random_state   воспроизводимость
#   cv.n_splits    число фолдов
#
# ML-специфика (модели, ансамбли, tune) — в ml/config.yaml
# DL-специфика (train, feature_mode)     — в dl/config.yaml
