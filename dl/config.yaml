# Настройки эксперимента Titanic (OmegaConf)
# Пути к данным и артефактам — в корневом config.yaml

train:
  lr: 1.0e-3
  weight_decay: 1.0e-4
  batch_size: 64
  max_epochs: 100
  early_stopping_patience: 12
  early_stopping_min_delta: 1.0e-4
  scheduler: plateau # plateau | cosine | none
  scheduler_patience: 4
  scheduler_factor: 0.5
  use_class_weights: false
  embedding_dim: 4
  mlp_dropout: 0.2
  use_amp: true # mixed precision on CUDA only
  amp_dtype: fp16 # fp16 | bf16

feature_mode: onehot # baseline | onehot | embedding
n_splits: 5
val_size: 0.2
# Единый seed: sklearn split/k-fold, веса PyTorch, shuffle батчей (см. config.set_seed)
random_state: 42