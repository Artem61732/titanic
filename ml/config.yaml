# Titanic ML pipeline (OmegaConf)
# Пути к данным и артефактам — в корневом config.yaml

experiment:
  compare_n_splits: [1, 5]
  metric: accuracy
  quick: false

# п.3 — валидация ближе к LB: repeated CV, hold-out, калибровка
validation:
  enabled: true
  n_repeats: 10 # RepeatedStratifiedKFold = n_repeats × n_splits оценок
  holdout_size: 0.2
  target_survival_rate: null # null → доля Survived=1 в train (~0.384)
  calibration_tolerance: 0.05 # |pred_rate - target_rate| ≤ tol → ok
  schemes: [kfold]
  save_report: true
  report_path: outputs/validation_report.json
  tune_scheme: kfold

features:
  # baseline: расширенный FE (Age по Title+Pclass, IsWoman/Child, Ticket, Surname rate)
  # onehot: + укрупнённый DeckCoarse, LogFare, FareBin
  mode: onehot # baseline | onehot | label
  scale: true
  drop_constant: true
  drop_correlated: true
  correlated_threshold: 0.95
  clip_outliers: true
  outlier_iqr: 1.5

preprocess_ablation:
  enabled: false
  probe_model: logistic_l2

models:
  enabled:
    - logistic
    - logistic_l1
    - logistic_l2
    - logistic_elasticnet
    - knn
    - decision_tree
    - random_forest
    - catboost
    - lightgbm
    - xgboost
  logistic_c_grid: [0.01, 0.1, 1.0, 10.0]
  elasticnet_l1_ratio_grid: [0.2, 0.5, 0.8]
  knn:
    n_neighbors: [3, 5, 7, 11, 15, 21]
    weights: [uniform, distance]
    metrics: [euclidean, manhattan, minkowski]
  decision_tree:
    max_depth: [3, 5, 7, 10, null]
    min_samples_leaf: [1, 3, 5, 10]
  random_forest:
    n_estimators: [100, 300, 500]
    max_depth: [5, 8, 12, null]
    min_samples_leaf: [1, 3, 5]
    max_features: [sqrt, log2]
  catboost:
    iterations: [300, 600]
    depth: [4, 6, 8]
    learning_rate: [0.03, 0.1]
    l2_leaf_reg: [1, 3, 5]
  lightgbm:
    n_estimators: [200, 400]
    num_leaves: [15, 31, 63]
    learning_rate: [0.03, 0.1]
    min_child_samples: [5, 20]
  xgboost:
    n_estimators: [200, 400]
    max_depth: [3, 5, 7]
    learning_rate: [0.03, 0.1]
    subsample: [0.8, 1.0]

tune:
  enabled: true
  n_trials: 40
  timeout_sec: null
  models: [catboost, lightgbm, xgboost, random_forest]

ensemble:
  enabled: true
  # onehot — единый режим признаков для всех базовых моделей ансамбля
  feature_mode: onehot
  top_k: 5
  methods:
    - diverse_voting
    - diverse_mean
    - rule_blend
    - diverse_rule_blend
    - rule_only
  diverse:
    random_forest:
      n_estimators: 200
      max_depth: 5
      min_samples_leaf: 5
      max_features: sqrt
    catboost:
      iterations: 300
      depth: 4
      learning_rate: 0.05
      l2_leaf_reg: 3.0
  rule_blend:
    ml_weight: 0.65 # (1 - ml_weight) — вес rule-based
    use_rules: [woman, pclass1, child]

submission:
  # logistic_l2 | tuned | ensemble_diverse_voting | ensemble_diverse_rule_blend | rule_only
  model: ensemble_diverse_voting
  feature_mode: null # null → ensemble.feature_mode (onehot для ансамбля)
  logistic:
    penalty: l2 # l2 | l1 | elasticnet
    C: 0.1
    l1_ratio: 0.5 # только для elasticnet
